<!DOCTYPE html>

<html>
    <head>
        <title>CensusAgeCalculator</title>
        
        <meta name ="viewport" content="width=device-width, initial-scale=1.0">

        <!--Link to CSS Style sheet-->
        <link rel="stylesheet" href="CensusStyles.css">

    </head>

    <body>
        <!--Class element centres images on page, width% keeps them Responsive-->
        <div class="content">
        <div class="image_container">

        <img src="PhotoMargaretDixon.png" alt="Individual photo" style="width:20%">

        <img src="Photo1911Census.png" alt="Census image" style="width:25%">

        </div>
        
        <!--This is the input form which will calculate the dates-->
        
        <h1>Input data</h1>

        <form onsubmit="calculateCensus(event)">
            <div>
                <label for="fname">First name:</label>
                <input type="text" id="fname" value=""> 
                <label for="lname">Last name:</label>
                <input type="text" id="lname" value=""><br><br>
            </div>

            <div>
                <label for="birthInput">Birth Date:</label> 
                <input type="date" id="birthInput" value="">
                <label for="bplace">Place of birth:</label> 
                <input type="text" id="birthPlace" value=""><br><br>
            </div>

            <div>
                <label for="deathInput" title="Enter death date if known">Death Date:</label>
                <input type="date" id="deathInput" value="">
                <title></title>
                <label for="dplace">Place of death:</label>
                <input type="text" id="dplace" value=""><br><br>
            </div>

            <input type="submit" value="Submit"><br><br>
        
        </form>

            <!--This is where the results are displayed-->
            <div id="results"></div>

            <a href="CensusAgeCalculator.html">Return to main page</a>
         
         
            <!--Below are the JavaScript calculations; they take the birth date input 
            and subtract it from each census date to find 'age' -->
            </div>
           <script>

            function calculateCensus(event) 
    {
            event.preventDefault(); //stops page refreshing //

            //collects all input values
            let birthInput = document.getElementById("birthInput").value;
            let birthDate = new Date(birthInput);
            let firstName = document.getElementById("fname").value;
            let lastName = document.getElementById("lname").value;
            let birthPlace = document.getElementById("birthPlace").value;
            let deathInput = document.getElementById("deathInput").value;
            let deathPlace = document.getElementById("dplace").value;

            //this formats the date from YYYYMMDD to DDAprilYYYY//
            let birthDateFormatted = birthDate.toLocaleDateString
            ("en-GB", 
            {
                day: "numeric",
                month: "long",
                year: "numeric"
            }
            );
           
            //if birthdate is empty - message on screen
                if (!birthInput) 
            {
                document.getElementById("results").innerHTML = "Please enter a birth date.";
                return;
            }
           
            //if deathdate is empty it is ignored, otherwise it is formatted as DDAprilYYYY
                let deathDateFormatted = "";

                if (deathInput) 
            {
                let deathDate = new Date(deathInput);
                deathDateFormatted = deathDate.toLocaleDateString
                ("en-GB",
                 {
                    day: "numeric",
                    month: "long",
                    year:"numeric"
                 }   
                );
            }     
                //create 'censuses' array containing multiple objects, 
                //each object has two properties 
                // - name: a string (e.g. 1851)
                // - date: a Date object (e.g., new Date("1851-03-30") //
            let censuses = 
            [
                {name:"1851", date: new Date("1851-03-30") },
                {name:"1861", date: new Date("1861-04-07") },
                {name:"1871", date: new Date("1871-04-02") },
                {name:"1881", date: new Date("1881-04-03") },
                {name:"1891", date: new Date("1891-04-05") },
                {name:"1901", date: new Date("1901-03-31") },
                {name:"1911", date: new Date("1911-04-02") },
                {name:"1921", date: new Date("1921-06-19") },
                {name:"1939 Register", date: new Date("1939-09-29") }
            ];

            let personInfo = `<p><b>${firstName} ${lastName}</b><br>
                Born: ${birthDateFormatted} in ${birthPlace}`;

            if (deathInput)
            {
                personInfo += `<br>Died: ${deathDateFormatted} in ${deathPlace}`;
            }

            personInfo += `</p>`;

            //Output - first a title, then person details, then the table with headings and rows
                let output = "<h2>Results</h2>";
                output += personInfo;
                output += "<table class='censusTable'>";
                output += "<tr><th>Census</th><th>Age</th></tr>";

            //this is the Loop - repeating the calculation for each census date
            censuses.forEach
            (census => 
                {
                let age = calculateAge(birthDate, census.date);

                    //this returns the age if the parameters are met and age is zero or higher
                    if (age >=0) 
                    {output += `<tr><td>${census.name}</td><td>${age}</td></tr>`;}
                }
            );

            output += "</table>";

            //display
            document.getElementById("results").innerHTML = output;
    }
        
    //begins the function of 'calculateAge'
        // using two Date object parameters; birthDate and censusDate//
        function calculateAge(birthDate, censusDate) 
    {
        //creates two variables 
         // 'age' = the value of the year of the census minus the year of the birthdate
         // 'm'   = the value of the month of the census minus the month of the birthdate//
        let age = censusDate.getFullYear() - birthDate.getFullYear();
        let m = censusDate.getMonth() - birthDate.getMonth();

        //check is m is greater than zero or (m is zero AND the census day is before the birthday)
        if(m < 0 || (m === 0 && censusDate.getDate() < birthDate.getDate())) 
            {
                //if the second condition is true, subtract a year from the age   
                age--;
            }
                return age;  
    }
        
           </script>
    </body>
</html>
